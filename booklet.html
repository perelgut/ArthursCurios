<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LitRPG Chapter 0 Booklet</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f1e3;
      --ink: #1d1d1d;
      --accent: #6b3f1f;
      --border: #c5a06a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #e6d9be, #f8f2e5);
      color: var(--ink);
      overflow: hidden;
    }

    .booklet {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 12px;
      overflow: hidden;
    }

    .page {
      width: min(1200px, calc(100vw - 24px));
      height: min(92vh, 900px);
      max-width: 100%;
      max-height: 100%;
      background: var(--paper);
      border: 2px solid var(--border);
      box-shadow: 0 16px 40px rgba(0,0,0,.18);
      padding: 14px 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--accent);
      flex-shrink: 0;
    }

    .page-body {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: auto;
      padding: 4px 0;
    }

    .page-body > * {
      width: 100%;
      max-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-body img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border: 1px solid rgba(0,0,0,.1);
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
    }

    .doc-preview {
      width: 100%;
      height: min(68vh, 620px);
      max-width: 100%;
      min-height: 240px;
      border: 1px solid rgba(0,0,0,.15);
      background: white;
    }

    .doc-link {
      margin-top: 10px;
      color: var(--accent);
      text-decoration: underline;
      font-weight: 600;
    }

    .contents-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 1.2rem;
    }

    .contents-list a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      display: inline-block;
    }

    .contents-list a:hover {
      border-bottom-color: var(--accent);
    }

    .page-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 8px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .nav-btn, .nav-link {
      border: 1px solid var(--border);
      background: #fffdf8;
      color: var(--accent);
      padding: 8px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }

    .nav-btn:hover, .nav-link:hover {
      transform: translateY(-1px);
      background: #f4ebd3;
    }

    .nav-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .page-label {
      font-size: 0.95rem;
      color: #5d4a2f;
    }

    @media (max-width: 900px) {
      .page { height: auto; min-height: 92vh; padding: 12px; }
      .doc-preview { height: min(54vh, 440px); min-height: 220px; }
      .page-nav { font-size: 0.95rem; }
    }

    @media (max-height: 760px) {
      .page { height: auto; min-height: 96vh; }
      .doc-preview { height: min(46vh, 320px); min-height: 200px; }
      .page-body { padding: 2px 0; }
    }
  </style>
</head>
<body>
  <div class="booklet">
    <div class="page">
      <div class="page-header">
        <span id="page-title">Cover</span>
        <span id="page-number" class="page-label"></span>
      </div>
      <div id="page-body" class="page-body"></div>
      <div class="page-nav">
        <button class="nav-btn" data-action="prev" disabled>← Previous</button>
        <a class="nav-link" href="#" data-action="contents">Return to Table of Contents</a>
        <button class="nav-btn" data-action="next">Next →</button>
      </div>
    </div>
  </div>

  <script>
    const pages = [
      {
        id: 'cover',
        title: 'Cover',
        label: 'Cover',
        content: '<img src="Images/cover%20concept.png" alt="Cover concept" />'
      },
      {
        id: 'frontpage',
        title: 'Front Page',
        label: 'Front Page',
        content: '<div><iframe class="doc-preview" src="frontpage_manga_preview.html" title="Front page document preview"></iframe><div><a class="doc-link" href="frontpage_manga_preview.html" target="_blank" rel="noreferrer">Open the front page preview</a></div></div>'
      },
      {
        id: 'contents',
        title: 'Contents',
        label: 'Contents',
        content: '<div><h2>Contents</h2><ul class="contents-list"><li><a href="#" data-go-to="chapter-cover">Chapter 0: Trapped in a Cat</a></li></ul></div>'
      },
      {
        id: 'chapter-cover',
        title: 'Chapter 0 Cover',
        label: 'Chapter 0 Cover',
        content: '<img src="Manga/Ch0.Manga%20Pg%20Chapter%20cover.jpg" alt="Chapter 0 chapter cover" />'
      },
      ...Array.from({ length: 23 }, (_, index) => {
        const pageNumber = String(index + 1).padStart(2, '0');
        return {
          id: `page-${pageNumber}`,
          title: `Page ${pageNumber}`,
          label: `Page ${pageNumber}`,
          content: `<img src="Manga/Chapter%200%20Manga/Ch0.Manga%20Pg%20${pageNumber}.jpg" alt="Manga page ${pageNumber}" />`
        };
      })
    ];

    const pageTitle = document.getElementById('page-title');
    const pageNumber = document.getElementById('page-number');
    const pageBody = document.getElementById('page-body');
    const prevBtn = document.querySelector('[data-action="prev"]');
    const nextBtn = document.querySelector('[data-action="next"]');
    const contentsLink = document.querySelector('[data-action="contents"]');

    let currentIndex = 0;

    function fitPageMedia() {
      const img = pageBody.querySelector('img');
      const iframe = pageBody.querySelector('iframe');

      if (img) {
        const naturalWidth = img.naturalWidth || img.width || 1;
        const naturalHeight = img.naturalHeight || img.height || 1;
        const maxWidth = Math.max(240, window.innerWidth - 80);
        const maxHeight = Math.max(240, window.innerHeight - 220);
        const scale = Math.min(1, maxWidth / naturalWidth, maxHeight / naturalHeight);
        const displayWidth = Math.max(120, Math.round(naturalWidth * scale));
        img.style.width = `${displayWidth}px`;
        img.style.height = 'auto';
        img.style.maxWidth = '100%';
        img.style.maxHeight = '100%';
      }

      if (iframe) {
        iframe.style.width = `${Math.min(1000, window.innerWidth - 80)}px`;
        iframe.style.maxWidth = '100%';
        iframe.style.height = `${Math.min(620, window.innerHeight - 220)}px`;
        iframe.style.maxHeight = '100%';
      }
    }

    function renderPage(index) {
      currentIndex = index;
      const page = pages[index];
      pageTitle.textContent = page.title;
      pageNumber.textContent = `${index + 1} / ${pages.length}`;
      pageBody.innerHTML = page.content;

      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === pages.length - 1;

      pageBody.querySelectorAll('[data-go-to]').forEach((link) => {
        link.addEventListener('click', (event) => {
          event.preventDefault();
          const targetId = link.getAttribute('data-go-to');
          const targetIndex = pages.findIndex((entry) => entry.id === targetId);
          if (targetIndex >= 0) {
            renderPage(targetIndex);
          }
        });
      });

      const img = pageBody.querySelector('img');
      if (img) {
        img.addEventListener('load', fitPageMedia, { once: true });
      }
      fitPageMedia();

      const hash = page.id;
      if (window.location.hash !== `#${hash}`) {
        window.history.replaceState({}, '', `#${hash}`);
      }
    }

    function move(step) {
      const targetIndex = currentIndex + step;
      if (targetIndex >= 0 && targetIndex < pages.length) {
        renderPage(targetIndex);
      }
    }

    prevBtn.addEventListener('click', () => move(-1));
    nextBtn.addEventListener('click', () => move(1));
    contentsLink.addEventListener('click', (event) => {
      event.preventDefault();
      renderPage(2);
    });

    window.addEventListener('hashchange', () => {
      const targetId = window.location.hash.replace('#', '');
      const targetIndex = pages.findIndex((entry) => entry.id === targetId);
      if (targetIndex >= 0) {
        renderPage(targetIndex);
      }
    });

    window.addEventListener('resize', fitPageMedia);

    const initialHash = window.location.hash.replace('#', '');
    const initialIndex = pages.findIndex((entry) => entry.id === initialHash);
    renderPage(initialIndex >= 0 ? initialIndex : 0);
  </script>
</body>
</html>
