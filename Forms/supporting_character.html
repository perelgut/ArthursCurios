<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supporting Character — Story Bible Entry</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:Georgia,'Times New Roman',serif;background:#1a1714;color:#efe7da;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:40px 24px 90px}
  a.back{color:#c8923d;text-decoration:none;font-size:14px}
  h1{font-size:28px;margin:8px 0 4px;color:#f3e9d8}
  .sub{color:#b9ab95;margin:0 0 26px;font-style:italic;font-size:15px}
  fieldset{border:1px solid #3a3128;border-radius:10px;margin:0 0 22px;padding:18px 20px 22px;background:#221d17}
  legend{color:#e8b765;font-size:16px;padding:0 8px;font-weight:bold}
  label{display:block;margin:0 0 14px;font-size:14px;color:#d8cab2}
  .hint{color:#8d8170;font-style:italic;font-size:12px}
  input,textarea{width:100%;margin-top:5px;background:#15120f;border:1px solid #443a2d;border-radius:6px;color:#f1ead8;padding:9px 11px;font-family:inherit;font-size:15px}
  input:focus,textarea:focus{outline:none;border-color:#c8923d}
  textarea{resize:vertical;line-height:1.55}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:0 18px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0 18px}
  .bar{position:sticky;bottom:0;background:#1a1714ee;border-top:1px solid #3a3128;padding:14px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap;backdrop-filter:blur(4px)}
  button{font-family:inherit;font-size:14px;border-radius:7px;padding:9px 16px;border:1px solid #c8923d;background:#c8923d;color:#1a1714;cursor:pointer;font-weight:bold}
  button.ghost{background:transparent;color:#c8923d}
  button:hover{filter:brightness(1.08)}
  #flash{color:#8fd18f;font-size:14px;opacity:0;transition:opacity .2s}
  #output{min-height:200px;font-family:Menlo,Consolas,monospace;font-size:13px;line-height:1.5}
  h2.out{font-size:15px;color:#b9ab95;margin:24px 0 8px}
</style>
</head>
<body data-form="supporting" data-type="Supporting Character">
<div class="wrap">
  <a class="back" href="index.html">&larr; All forms</a>
  <h1>Supporting Character</h1>
  <p class="sub">Output pastes under a new <strong>## Name</strong> block in 03_Characters.md.</p>

  <fieldset>
    <legend>Identity</legend>
    <label>Name <span class="hint">(becomes the ## heading)</span>
      <input type="text" id="entryName" placeholder="e.g. Danica Lapczuk"></label>
    <div class="row">
      <label>Role <input type="text" id="role" data-md="meta" data-label="Role" value="Supporting Character (POV)"></label>
      <label>Gender <input type="text" id="gender" data-md="meta" data-label="Gender" placeholder="Male / Female / ..."></label>
    </div>
    <div class="row">
      <label>First Appearance <input type="text" id="firstapp" data-md="meta" data-label="First Appearance" placeholder="Book 1, Ch. 1 (train station)"></label>
      <label>Aliases <input type="text" id="aliases" data-md="meta" data-label="Aliases" placeholder="comma-separated"></label>
    </div>
    <label>Groups <input type="text" id="groups" data-md="meta" data-label="Groups" placeholder="comma-separated"></label>
  </fieldset>

  <fieldset>
    <legend>Stats / Class / Magic_Level / Store_Credits</legend>
    <div class="row">
      <label>Class <input type="text" id="class" data-md="stat" data-label="Class" placeholder="e.g. Livery Driver"></label>
      <label></label>
    </div>
    <div class="row">
      <label>Magic_Level <input type="number" id="magiclevel" data-md="stat" data-label="Magic_Level" min="0" step="1"></label>
      <label>Store_Credits <input type="number" id="credits" data-md="stat" data-label="Store_Credits" min="0" step="1"></label>
    </div>
    <p class="hint" style="margin:4px 0 10px">Six classic stats, AD&amp;D scale 3&ndash;18.</p>
    <div class="stats">
      <label>Strength <input type="number" id="str" data-md="stat" data-label="Strength" min="3" max="18" step="1"></label>
      <label>Intelligence <input type="number" id="int" data-md="stat" data-label="Intelligence" min="3" max="18" step="1"></label>
      <label>Wisdom <input type="number" id="wis" data-md="stat" data-label="Wisdom" min="3" max="18" step="1"></label>
      <label>Dexterity <input type="number" id="dex" data-md="stat" data-label="Dexterity" min="3" max="18" step="1"></label>
      <label>Constitution <input type="number" id="con" data-md="stat" data-label="Constitution" min="3" max="18" step="1"></label>
      <label>Charisma <input type="number" id="cha" data-md="stat" data-label="Charisma" min="3" max="18" step="1"></label>
    </div>
  </fieldset>

  <fieldset>
    <legend>Profile</legend>
    <label>Personality <textarea id="personality" data-md="section" data-label="Personality" rows="4"></textarea></label>
    <label>Skills or Resources <textarea id="skills" data-md="section" data-label="Skills or Resources" rows="3"></textarea></label>
    <label>Relationship to Protagonist <textarea id="relationship" data-md="section" data-label="Relationship to Protagonist" rows="3"></textarea></label>
    <label>Role in Story <textarea id="rolestory" data-md="section" data-label="Role in Story" rows="3"></textarea></label>
    <label>Physical Description <textarea id="physical" data-md="section" data-label="Physical Description" rows="4"></textarea></label>
    <label>Dialogue Style <textarea id="dialogue" data-md="section" data-label="Dialogue Style" rows="3"></textarea></label>
    <label>Knows / Doesn't Know <textarea id="knows" data-md="section" data-label="Knows / Doesn't Know" rows="3"></textarea></label>
  </fieldset>

  <h2 class="out">Generated Markdown</h2>
  <textarea id="output" readonly placeholder="Click Generate Markdown..."></textarea>

  <div class="bar">
    <button onclick="genMarkdown()">Generate Markdown</button>
    <button class="ghost" onclick="copyMd()">Copy</button>
    <button class="ghost" onclick="downloadMd()">Download .md</button>
    <button class="ghost" onclick="clearForm()">Clear</button>
    <span id="flash"></span>
  </div>
</div>
<script>
function genMarkdown(){
  const name=(document.getElementById('entryName').value||'').trim();
  let md='## '+(name||'(unnamed)')+'\n';
  const meta=[...document.querySelectorAll('[data-md="meta"]')].filter(e=>e.value.trim()!=='');
  if(meta.length) md+=meta.map(e=>'**'+e.dataset.label+':** '+e.value.trim()).join('  •  ')+'\n';
  const stats=[...document.querySelectorAll('[data-md="stat"]')].filter(e=>e.value.trim()!=='');
  if(stats.length){ md+='### Stats / Class / Magic_Level / Store_Credits\n'; stats.forEach(e=>md+='- **'+e.dataset.label+':** '+e.value.trim()+'\n'); }
  document.querySelectorAll('[data-md="section"]').forEach(e=>{ md+='### '+e.dataset.label+'\n'+e.value.trim()+'\n'; });
  document.getElementById('output').value=md;
  return md;
}
function copyMd(){ const md=genMarkdown(); const o=document.getElementById('output'); o.select();
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(md).then(()=>flash('Copied'),()=>{document.execCommand('copy');flash('Copied');}); }
  else { document.execCommand('copy'); flash('Copied'); } }
function downloadMd(){ const md=genMarkdown();
  let n=(document.getElementById('entryName').value||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'entry';
  const b=new Blob([md],{type:'text/markdown'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=n+'.md'; document.body.appendChild(a); a.click(); a.remove(); }
function flash(m){ const f=document.getElementById('flash'); f.textContent=m; f.style.opacity=1; setTimeout(()=>f.style.opacity=0,1300); }
const FORMKEY='litrpg-'+document.body.dataset.form;
function saveDraft(){ try{ const d={}; document.querySelectorAll('input,textarea').forEach(e=>{ if(e.id&&e.id!=='output') d[e.id]=e.value; }); localStorage.setItem(FORMKEY,JSON.stringify(d)); }catch(e){} }
function loadDraft(){ try{ const s=localStorage.getItem(FORMKEY); if(!s)return; const d=JSON.parse(s); Object.keys(d).forEach(k=>{ const el=document.getElementById(k); if(el) el.value=d[k]; }); }catch(e){} }
function clearForm(){ if(!confirm('Clear all fields and saved draft?'))return; document.querySelectorAll('input,textarea').forEach(e=>{ e.value=''; }); document.getElementById('role').value='Supporting Character (POV)'; try{localStorage.removeItem(FORMKEY);}catch(e){} }
document.addEventListener('input',saveDraft);
window.addEventListener('DOMContentLoaded',loadDraft);
</script>
<script src="bible_data.js"></script>
<script src="bible.js"></script>
</body>
</html>
